{% extends "base.html" %}

{% block title %}Login - Smart Expense Tracker{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="glass-card animate-fade-in" style="width: 100%; max-width: 450px; padding: 3rem;">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div style="width: 60px; height: 60px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 16px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; margin: 0 auto 1.5rem; box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4);">
                <i class="fa-solid fa-lock"></i>
            </div>
            <h2 style="font-size: 1.75rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 0.5rem;">Welcome Back</h2>
            <p style="color: var(--text-muted); font-weight: 500;">Access your personal finance dashboard</p>
        </div>
        
        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="name@example.com" required>
            </div>
            <div class="form-group" style="margin-bottom: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                    <label for="password" style="margin-bottom: 0;">Password</label>
                    <a href="#" style="font-size: 0.8rem; color: var(--primary); text-decoration: none; font-weight: 600;">Forgot?</a>
                </div>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Login</button>
        </form>
        
        <div style="margin-top: 2rem; text-align: center; font-size: 0.95rem; font-weight: 500; color: var(--text-muted);">
            Don't have an account? <a href="{{ url_for('auth.signup') }}" style="color: var(--primary); text-decoration: none; font-weight: 700; margin-left: 0.25rem;">Sign up</a>
        </div>
    </div>
</div>
{% endblock %}
