{% extends "base.html" %}

{% block title %}Login - Smart Expense Tracker{% endblock %}

{% block content %}
<div class="card auth-card">
    <h2 style="margin-bottom: 0.5rem;">Welcome Back</h2>
    <p style="color: var(--text-light); margin-bottom: 2rem;">Log in to manage your expenses</p>
    
    <form action="{{ url_for('auth.login') }}" method="POST">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="name@example.com" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn">Login</button>
    </form>
    
    <p style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem;">
        Don't have an account? <a href="{{ url_for('auth.signup') }}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign up</a>
    </p>
</div>
{% endblock %}
