{% extends "base.html" %}

{% block title %}Edit Expense - Smart Expense Tracker{% endblock %}

{% block content %}
<div class="card auth-card">
    <h2 style="margin-bottom: 2rem;">Edit Expense</h2>
    
    <form action="{{ url_for('expenses.edit_expense', expense_id=expense.id) }}" method="POST">
        <div class="form-group">
            <label for="amount">Amount (₹)</label>
            <input type="number" step="0.01" id="amount" name="amount" value="{{ expense.amount }}" required>
        </div>
        
        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category" required>
                <option value="Food" {{ 'selected' if expense.category == 'Food' }}>Food</option>
                <option value="Travel" {{ 'selected' if expense.category == 'Travel' }}>Travel</option>
                <option value="Shopping" {{ 'selected' if expense.category == 'Shopping' }}>Shopping</option>
                <option value="Bills" {{ 'selected' if expense.category == 'Bills' }}>Bills</option>
                <option value="Others" {{ 'selected' if expense.category == 'Others' }}>Others</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" name="date" value="{{ expense.expense_date }}" required>
        </div>
        
        <div class="form-group">
            <label for="description">Description (Optional)</label>
            <textarea id="description" name="description" rows="3">{{ expense.description }}</textarea>
        </div>
        
        <button type="submit" class="btn">Update Expense</button>
        <a href="{{ url_for('expenses.dashboard') }}" style="display: block; text-align: center; margin-top: 1rem; text-decoration: none; color: var(--text-light);">Cancel</a>
    </form>
</div>
{% endblock %}
