{% extends "base.html" %}

{% block title %}Add Expense - Smart Expense Tracker{% endblock %}

{% block content %}
<div class="card auth-card" style="max-width: 550px;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <div style="background: rgba(99, 102, 241, 0.1); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
            <i class="fa-solid fa-receipt" style="color: var(--primary); font-size: 1.5rem;"></i>
        </div>
        <h2 style="font-size: 1.75rem; font-weight: 800; letter-spacing: -0.02em;">Add New Expense</h2>
        <p style="color: var(--text-light); font-size: 0.9rem;">Keep track of where your money goes.</p>
    </div>
    
    <form action="{{ url_for('expenses.add_expense') }}" method="POST">
        <div class="form-group">
            <label for="amount"><i class="fa-solid fa-indian-rupee-sign"></i> Amount</label>
            <input type="number" step="0.01" id="amount" name="amount" placeholder="0.00" style="font-size: 1.25rem; font-weight: 700;" required>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
                <label for="category"><i class="fa-solid fa-list-ul"></i> Category</label>
                <select id="category" name="category" required>
                    <option value="" disabled selected>Select Category</option>
                    <option value="Food">Food</option>
                    <option value="Travel">Travel</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Bills">Bills</option>
                    <option value="Others">Others</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="date"><i class="fa-solid fa-calendar"></i> Date</label>
                <input type="date" id="date" name="date" required>
            </div>
        </div>
        
        <div class="form-group">
            <label for="description"><i class="fa-solid fa-pen"></i> Description (Optional)</label>
            <textarea id="description" name="description" rows="2" placeholder="e.g. Starbucks coffee"></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
            Save Expense
        </button>
        <a href="{{ url_for('expenses.dashboard') }}" style="display: block; text-align: center; margin-top: 1.25rem; text-decoration: none; color: var(--text-light); font-weight: 600; font-size: 0.9rem;">
            <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
        </a>
    </form>
</div>

<script>
    // Set default date to today
    document.getElementById('date').valueAsDate = new Date();
</script>
{% endblock %}
