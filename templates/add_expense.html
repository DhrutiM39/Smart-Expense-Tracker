{% extends "base.html" %}

{% block title %}Add Expense - Smart Expense Tracker{% endblock %}

{% block content %}
<div class="card auth-card">
    <h2 style="margin-bottom: 2rem;">Add New Expense</h2>
    
    <form action="{{ url_for('expenses.add_expense') }}" method="POST">
        <div class="form-group">
            <label for="amount">Amount (₹)</label>
            <input type="number" step="0.01" id="amount" name="amount" placeholder="0.00" required>
        </div>
        
        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category" required>
                <option value="" disabled selected>Select Category</option>
                <option value="Food">Food</option>
                <option value="Travel">Travel</option>
                <option value="Shopping">Shopping</option>
                <option value="Bills">Bills</option>
                <option value="Others">Others</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" name="date" value="{{ today }}" required>
        </div>
        
        <div class="form-group">
            <label for="description">Description (Optional)</label>
            <textarea id="description" name="description" rows="3" placeholder="What was this for?"></textarea>
        </div>
        
        <button type="submit" class="btn">Add Expense</button>
        <a href="{{ url_for('expenses.dashboard') }}" style="display: block; text-align: center; margin-top: 1rem; text-decoration: none; color: var(--text-light);">Cancel</a>
    </form>
</div>

<script>
    // Set default date to today
    document.getElementById('date').valueAsDate = new Date();
</script>
{% endblock %}
