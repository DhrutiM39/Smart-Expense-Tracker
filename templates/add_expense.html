{% extends "base.html" %}

{% block title %}Add Expense - Smart Expense Tracker{% endblock %}

{% block header_content %}
    <h1 style="font-size: 1.75rem; font-weight: 800; letter-spacing: -0.03em;">Add Expense</h1>
{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: flex-start; min-height: 80vh;">
    <div class="glass-card animate-fade-in" style="width: 100%; max-width: 600px; padding: 3rem;">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div style="width: 56px; height: 56px; background: rgba(79, 70, 229, 0.08); color: var(--primary); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto 1.5rem;">
                <i class="fa-solid fa-plus-circle"></i>
            </div>
            <h2 style="font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em;">New Transaction</h2>
            <p style="color: var(--text-muted); font-weight: 500;">Record your spending to stay on budget.</p>
        </div>
        
        <form action="{{ url_for('expenses.add_expense') }}" method="POST">
            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="amount">Amount (₹)</label>
                <input type="number" step="0.01" id="amount" name="amount" class="form-control" placeholder="0.00" style="font-size: 1.5rem; font-weight: 800; text-align: center; padding: 1.5rem;" required autofocus>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-control" required>
                        <option value="" disabled selected>Select Category</option>
                        <option value="Food">Food</option>
                        <option value="Travel">Travel</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Bills">Bills</option>
                        <option value="Others">Others</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" class="form-control" required>
                </div>
            </div>
            
            <div class="form-group" style="margin-bottom: 2.5rem;">
                <label for="description">Description (Optional)</label>
                <textarea id="description" name="description" class="form-control" rows="2" placeholder="What was this for?"></textarea>
            </div>
            
            <div style="display: flex; gap: 1rem;">
                <a href="{{ url_for('expenses.dashboard') }}" class="btn" style="flex: 1; background: #f1f5f9; color: var(--text-muted);">Cancel</a>
                <button type="submit" class="btn btn-primary" style="flex: 2;">Save Transaction</button>
            </div>
        </form>
    </div>
</div>

<script>
    document.getElementById('date').valueAsDate = new Date();
</script>
{% endblock %}
