{% extends "base.html" %}

{% block title %}Signup - Smart Expense Tracker{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="glass-card animate-fade-in" style="width: 100%; max-width: 450px; padding: 3rem;">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div style="width: 60px; height: 60px; background: linear-gradient(135deg, var(--secondary), var(--accent)); border-radius: 16px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; margin: 0 auto 1.5rem; box-shadow: 0 10px 20px -5px rgba(124, 58, 237, 0.4);">
                <i class="fa-solid fa-user-plus"></i>
            </div>
            <h2 style="font-size: 1.75rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 0.5rem;">Create Account</h2>
            <p style="color: var(--text-muted); font-weight: 500;">Join us and master your spending</p>
        </div>
        
        <form action="{{ url_for('auth.signup') }}" method="POST">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="name@example.com" required>
            </div>
            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Create Account</button>
        </form>
        
        <div style="margin-top: 2rem; text-align: center; font-size: 0.95rem; font-weight: 500; color: var(--text-muted);">
            Already have an account? <a href="{{ url_for('auth.login') }}" style="color: var(--primary); text-decoration: none; font-weight: 700; margin-left: 0.25rem;">Login</a>
        </div>
    </div>
</div>
{% endblock %}
